spring:
  application:
    name: finarg-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/finarg
    username: finarg
    password: finarg123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-replace-in-production-with-env-var-min-256-bits}
  expiration: 86400000
  refresh-expiration: 604800000

app:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  reserves:
    countries:
      ar:
        methodologies:
          bcra:
            liabilities:
              - id: china_swap
                name: Swap China
                amount: 18291
              - id: bank_deposits
                name: Encajes Bancarios
                amount: 15000
              - id: usa_swap
                name: Swap EEUU
                amount: 2500
              - id: sedesa_repo
                name: REPO SEDESA y otros
                amount: 3295
              - id: other_bcra
                name: Otros pasivos BCRA
                amount: 100
          fmi:
            liabilities:
              - id: china_swap
                name: Swap China
                amount: 18291
              - id: bank_deposits
                name: Encajes Bancarios
                amount: 15000
              - id: usa_swap
                name: Swap EEUU
                amount: 2500
              - id: sedesa_repo
                name: REPO SEDESA y otros
                amount: 3295
              - id: other_bcra
                name: Otros pasivos corto plazo
                amount: 100
              - id: gov_deposits
                name: Depósitos del Gobierno
                amount: 300
              - id: leliq_pases
                name: LELIQs y pases (USD)
                amount: 0
              - id: other_fmi
                name: Pasivos del Tesoro (programa FMI)
                amount: 20000
  logging:
    request:
      enabled: true
      include-query-string: false

external:
  apis:
    dolar-api:
      base-url: https://dolarapi.com/v1
      timeout: 10000
    argentina-datos:
      base-url: https://api.argentinadatos.com/v1
      timeout: 10000
    ambito:
      base-url: https://mercados.ambito.com
      timeout: 10000
    exchangerate:
      base-url: https://open.er-api.com/v6
      timeout: 10000
    datos-gob-ar:
      base-url: https://apis.datos.gob.ar/series/api
      timeout: 60000
    bcra:
      base-url: https://api.bcra.gob.ar
      timeout: 15000
      series:
        encajes: 4
        uva: 7913
        cer: 3540
    colombia:
      base-url: https://www.datos.gov.co/api
      timeout: 10000
    brasil:
      base-url: https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata
      timeout: 10000
    chile:
      base-url: https://mindicador.cl/api
      timeout: 10000
    uruguay:
      base-url: https://www.bcu.gub.uy/api
      timeout: 10000
    wikidata:
      base-url: https://query.wikidata.org
      timeout: 15000

logging:
  level:
    root: INFO
    com.finarg: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%15.15t] [%X{requestId}] %-40.40logger{39} : %m%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

exchange-bands:
  floor: 906.51
  ceiling: 1542.88
  crawling-peg-monthly: 0.01
  last-update: "2025-02-01"
