spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://finarg.vercel.app}

logging:
  level:
    root: INFO
    com.finarg: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  file:
    name: ${LOG_FILE:${LOG_PATH:./logs}/application.log}

app:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
  logging:
    request:
      enabled: true
      include-query-string: false

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
