name: Security Scanning

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
  workflow_call:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # CodeQL requires GitHub Advanced Security (paid feature for private repos)
  # Disabled for now - enable when repo is public or has Advanced Security
  # codeql:
  #   name: CodeQL Analysis
  #   runs-on: ubuntu-latest
  #   strategy:
  #     fail-fast: false
  #     matrix:
  #       language: ['java', 'javascript']
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #     - name: Initialize CodeQL
  #       uses: github/codeql-action/init@v3
  #       with:
  #         languages: ${{ matrix.language }}
  #     - name: Perform CodeQL Analysis
  #       uses: github/codeql-action/analyze@v3

  trivy-backend:
    name: Trivy - Backend Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image with cache
        uses: docker/build-push-action@v5
        with:
          context: ./finarg-backend
          push: false
          load: true
          tags: finarg-backend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'finarg-backend:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  trivy-frontend:
    name: Trivy - Frontend Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image with cache
        uses: docker/build-push-action@v5
        with:
          context: ./finarg-frontend
          push: false
          load: true
          tags: finarg-frontend:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'finarg-frontend:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
