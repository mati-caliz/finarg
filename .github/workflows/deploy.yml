name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 20m
          script: |
            cd /root/finarg

            echo "📥 Pulling latest changes..."
            git pull origin main

            echo "🔍 Detecting changes..."
            BACKEND_CHANGED=$(git diff HEAD@{1} HEAD --name-only | grep -q "api/" && echo "true" || echo "false")
            FRONTEND_CHANGED=$(git diff HEAD@{1} HEAD --name-only | grep -q "web/" && echo "true" || echo "false")

            echo "Backend changed: $BACKEND_CHANGED"
            echo "Frontend changed: $FRONTEND_CHANGED"

            # Setup buildx for better caching
            if ! docker buildx inspect finarg-builder > /dev/null 2>&1; then
              echo "🔧 Creating buildx builder..."
              docker buildx create --name finarg-builder --driver docker-container --use
              docker buildx inspect --bootstrap
            else
              docker buildx use finarg-builder
            fi

            # Build only what changed
            if [ "$BACKEND_CHANGED" = "true" ]; then
              echo "🔨 Building backend with cache..."
              DOCKER_BUILDKIT=1 docker buildx bake -f docker-compose.prod.yml --load backend
            else
              echo "⏭️ Skipping backend build (no changes)"
            fi

            if [ "$FRONTEND_CHANGED" = "true" ]; then
              echo "🔨 Building frontend with cache..."
              DOCKER_BUILDKIT=1 docker buildx bake -f docker-compose.prod.yml --load frontend
            else
              echo "⏭️ Skipping frontend build (no changes)"
            fi

            echo "🚀 Starting services..."
            docker compose -f docker-compose.prod.yml up -d

            echo "⏳ Waiting for services..."
            sleep 15

            echo "📊 Service status:"
            docker compose -f docker-compose.prod.yml ps

            echo "🧹 Cleaning up..."
            docker image prune -f --filter "dangling=true"
            docker builder prune -f --filter "unused-for=24h"

            echo "✅ Deployment complete!"
            echo "🌐 Site: http://178.156.210.71"
