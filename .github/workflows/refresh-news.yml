name: Refresh News

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to refresh news'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read

jobs:
  refresh-news:
    name: Trigger News Aggregation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Refresh news in production
        if: ${{ github.event.inputs.environment == 'production' }}
        run: |
          echo "🔄 Triggering news aggregation in PRODUCTION..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://finlatamio.com/api/data/news/refresh")

          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 204 ]; then
            echo "✅ News aggregation triggered successfully!"
          else
            echo "❌ Error: HTTP code $HTTP_CODE"
            exit 1
          fi

      - name: Refresh news in staging
        if: ${{ github.event.inputs.environment == 'staging' }}
        run: |
          echo "🔄 Triggering news aggregation in STAGING..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://staging.finlatamio.com/api/data/news/refresh")

          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 204 ]; then
            echo "✅ News aggregation triggered successfully!"
          else
            echo "❌ Error: HTTP code $HTTP_CODE"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## News Refresh Summary 📰" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Successfully triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What happens next?" >> $GITHUB_STEP_SUMMARY
          echo "1. Scrapers fetch news from Infobae and El Economista" >> $GITHUB_STEP_SUMMARY
          echo "2. News are saved to database" >> $GITHUB_STEP_SUMMARY
