spring:
  application:
    name: api

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:finarg}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:validate}
    show-sql: ${HIBERNATE_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000

  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false

#  mail:
#    host: ${MAIL_HOST:localhost}
#    port: ${MAIL_PORT:25}
#    username: ${MAIL_USERNAME:}
#    password: ${MAIL_PASSWORD:}
#    properties:
#      mail:
#        smtp:
#          auth: ${MAIL_SMTP_AUTH:false}
#          starttls:
#            enable: ${MAIL_SMTP_STARTTLS:false}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

app:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  cookie:
    secure: false
    domain:
  logging:
    request:
      enabled: true
      include-query-string: false

external:
  apis:
    dolar-api:
      base-url: https://dolarapi.com/v1
      timeout: 10000
    argentina-datos:
      base-url: https://api.argentinadatos.com/v1
      timeout: 10000
    ambito:
      base-url: https://mercados.ambito.com
      timeout: 10000
    exchangerate:
      base-url: https://open.er-api.com/v6
      timeout: 10000
    datos-gob-ar:
      base-url: https://apis.datos.gob.ar/series/api
      timeout: 60000
    bcra:
      base-url: https://api.bcra.gob.ar
      timeout: 15000
      series:
        encajes: 4
        uva: 7913
        cer: 3540
    colombia:
      base-url: https://www.datos.gov.co/api
      timeout: 10000
    brasil:
      base-url: https://olinda.bcb.gov.br/olinda/servico/PTAX/versao/v1/odata
      timeout: 10000
    chile:
      base-url: https://mindicador.cl/api
      timeout: 10000
    uruguay:
      base-url: https://www.bcu.gub.uy/api
      timeout: 10000
    wikidata:
      base-url: https://query.wikidata.org
      timeout: 15000
    fci:
      base-url: https://api.argentinadatos.com
      timeout: 30000
    metals-api:
      base-url: https://metals-api.com/api
      api-key: ${METALS_API_KEY:}
      timeout: 10000
    finnhub:
      base-url: https://finnhub.io/api/v1
      api-key: ${FINNHUB_API_KEY:}
      timeout: 15000
    iol:
      base-url: https://api.invertironline.com
      timeout: 15000
    ollama:
      base-url: http://ollama:11434
      timeout: 30000
    argentina-holidays:
      base-url: https://date.nager.at/api/v3/publicholidays
      timeout: 10000

scheduler:
  enabled: true
  news:
    cron: "0 0 8 * * *"

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.finarg: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%15.15t] [%X{requestId}] %-40.40logger{39} : %m%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

exchange-bands:
  floor: 906.51
  ceiling: 1542.88
  crawling-peg-monthly: 0.01
  last-update: "2025-02-01"
