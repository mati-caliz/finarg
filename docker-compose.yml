version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finarg-postgres
    environment:
      POSTGRES_DB: finarg
      POSTGRES_USER: finarg
      POSTGRES_PASSWORD: finarg123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finarg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finarg"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finarg-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - finarg-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  finarg-network:
    driver: bridge
